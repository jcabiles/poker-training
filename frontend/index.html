<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Ctext%20y='13'%20font-size='13'%3E%E2%99%A0%3C/text%3E%3C/svg%3E" />
    <!-- Above-the-fold self-hosted fonts (@font-face lives in src/styles/tokens.css).
         Bold + Italic load on demand; font-display: swap covers the gap. -->
    <link rel="preload" href="/fonts/Fraunces-VF.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/SourceSans3-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/SourceSans3-Semibold.woff2" as="font" type="font/woff2" crossorigin />
    <title>Poker Trainer</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- T2: restore the saved Night|Day room before first paint (default: dark)
         so the theme never flashes. Mirrors App.tsx's THEME_KEY / readTheme. -->
    <script>
      try {
        if (localStorage.getItem("theme") === "light") {
          document.documentElement.dataset.theme = "light";
        }
      } catch (e) {
        /* localStorage unavailable — keep the default dark theme */
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
